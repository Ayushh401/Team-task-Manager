[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[[services]]
name = "team-task-manager"

[services.variables]
NODE_ENV = "production"
PORT = "5000"

[[services.ports]]
port = 5000
handlers = ["http"]

[[services.health_checks]]
path = "/api/health"
method = "GET"
interval_seconds = 10
timeout_seconds = 5
success_threshold = 3
failure_threshold = 5
